# Cloud Build 트리거용: GitHub push 시 이미지 빌드 → Artifact Registry 푸시 → Cloud Run 배포
# _IMAGE_PATH: Artifact Registry 이미지 경로(슬래시 가능). _SERVICE: Cloud Run 서비스 이름(슬래시 불가, 63자 이내)
# 이미지: .../cloud-run-source-deploy/smartbrief/smartnotam3  /  서비스 이름: smartnotam3
substitutions:
  _REGION: asia-northeast3
  _REPO: cloud-run-source-deploy
  _IMAGE_PATH: smartbrief/smartnotam3
  _SERVICE: smartnotam3

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Docker 이미지 빌드
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:latest
      - .
    id: build

  # 2. Artifact Registry에 푸시
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:${SHORT_SHA}
    id: push-sha
    waitFor: [build]

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:latest
    id: push-latest
    waitFor: [build]

  # 3. Cloud Run 배포 (기존 환경 변수 유지)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --project
      - ${PROJECT_ID}
    id: deploy
    waitFor: [push-sha]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_PATH}:latest
